services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prodataviz-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://84.235.235.15/api"
    container_name: prodataviz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: prodataviz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-prodataviz.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
