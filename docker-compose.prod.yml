# --------------------------------------------------
# docker-compose.prod.yml
# Production compose file — pulls pre-built images
# from GitHub Container Registry instead of building.
# --------------------------------------------------
services:
  backend:
    image: ghcr.io/toufik98/prodataviz-backend:${TAG:-latest}
    container_name: prodataviz-backend
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/toufik98/prodataviz-frontend:${TAG:-latest}
    container_name: prodataviz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: prodataviz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-prodataviz.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - backend
      - frontend

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "fd00:dead:beef::/48"
