# --------------------------------------------------
# docker-compose.prod.yml
# Production compose file — pulls pre-built images
# from GitHub Container Registry instead of building.
# Nginx is managed separately by nginx-infra repo.
# --------------------------------------------------
services:
  backend:
    image: ghcr.io/toufik98/prodataviz-backend:${TAG:-latest}
    container_name: prodataviz-backend
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/toufik98/prodataviz-frontend:${TAG:-latest}
    container_name: prodataviz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: prodataviz_default
    external: true
