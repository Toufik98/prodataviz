server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tferhat.com;

    ssl_certificate     /etc/ssl/cloudflare/tferhat.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/tferhat.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Redirect root to prodataviz ---
    location = / {
        return 302 /projects/prodataviz/;
    }

    # --- Backend API (strip /projects/prodataviz prefix) ---
    location /projects/prodataviz/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Backend docs (under subpath) ---
    location /projects/prodataviz/docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /projects/prodataviz/redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /projects/prodataviz/openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Frontend (Next.js with basePath=/projects/prodataviz) ---
    location /projects/prodataviz/ {
        proxy_pass http://frontend:3000/projects/prodataviz/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
